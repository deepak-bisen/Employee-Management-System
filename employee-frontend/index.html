<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Enhanced Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white min-h-screen p-4 hidden md:block">
        <h1 class="text-2xl font-bold mb-8 flex items-center">
            <i class="fas fa-users-cog mr-2"></i> EMS Pro
        </h1>
        <nav class="space-y-2">
            <a href="#" class="block p-3 bg-indigo-800 rounded transition"><i class="fas fa-chart-line mr-2"></i> Dashboard</a>
            <a href="#" class="block p-3 hover:bg-indigo-700 rounded transition"><i class="fas fa-user-friends mr-2"></i> Employees</a>
            <a href="#" class="block p-3 hover:bg-indigo-700 rounded transition"><i class="fas fa-calendar-check mr-2"></i> Leave Requests</a>
            <a href="#" class="block p-3 hover:bg-indigo-700 rounded transition"><i class="fas fa-file-invoice-dollar mr-2"></i> Payroll</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <!-- Top Nav -->
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-semibold text-gray-800">Admin Overview</h2>
            <div class="flex items-center space-x-4">
                <span class="text-gray-600 font-medium">Welcome, Admin</span>
                <button class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Logout</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="text-indigo-600 text-3xl mb-2"><i class="fas fa-users"></i></div>
                <div class="text-gray-500 text-sm uppercase">Total Employees</div>
                <div class="text-3xl font-bold">124</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="text-orange-500 text-3xl mb-2"><i class="fas fa-clock"></i></div>
                <div class="text-gray-500 text-sm uppercase">Pending Leaves</div>
                <div class="text-3xl font-bold">12</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="text-green-500 text-3xl mb-2"><i class="fas fa-building"></i></div>
                <div class="text-gray-500 text-sm uppercase">Departments</div>
                <div class="text-3xl font-bold">6</div>
            </div>
        </div>

        <!-- Recent Employee List -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-lg">Employee Management</h3>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                    <i class="fas fa-plus mr-1"></i> Add Employee
                </button>
            </div>
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                    <tr>
                        <th class="p-4">Name</th>
                        <th class="p-4">Department</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr>
                        <td class="p-4 flex items-center">
                            <div class="w-8 h-8 rounded-full bg-gray-200 mr-3 flex items-center justify-center text-xs font-bold">JD</div>
                            <div>
                                <div class="font-medium">John Doe</div>
                                <div class="text-xs text-gray-400">john@example.com</div>
                            </div>
                        </td>
                        <td class="p-4">IT Support</td>
                        <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs">Active</span></td>
                        <td class="p-4">
                            <button class="text-blue-600 hover:text-blue-800 mr-3"><i class="fas fa-edit"></i></button>
                            <button class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
