<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white min-h-screen p-4 hidden md:block fixed">
        <h1 class="text-2xl font-bold mb-8 flex items-center">
            <i class="fas fa-users-cog mr-2"></i> EMS Pro
        </h1>
        <nav class="space-y-2">
            <button onclick="showSection('employees')" class="nav-link w-full text-left p-3 bg-indigo-800 rounded transition flex items-center">
                <i class="fas fa-user-friends mr-3"></i> Employees
            </button>
            <button onclick="showSection('leaves')" class="nav-link w-full text-left p-3 hover:bg-indigo-700 rounded transition flex items-center">
                <i class="fas fa-calendar-check mr-3"></i> Leave Requests
            </button>
        </nav>
        <div class="absolute bottom-4 left-4 right-4">
            <button onclick="logout()" class="w-full bg-red-600 p-2 rounded hover:bg-red-700 transition">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
        <!-- Top Nav -->
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm">
            <h2 id="section-title" class="text-2xl font-semibold text-gray-800">Employee Management</h2>
            <div class="flex items-center space-x-4">
                <span class="text-gray-600 font-medium">Hello, <span id="display-username">Admin</span></span>
            </div>
        </header>

        <!-- Employee Management Section -->
        <div id="section-employees" class="content-section">
            <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg">Manage Staff</h3>
                    <button onclick="toggleEmployeeForm()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                        <i class="fas fa-plus mr-1"></i> Add Employee
                    </button>
                </div>
                <!-- Simple Employee Form (Hidden by default) -->
                <div id="employee-form-container" class="hidden p-6 bg-gray-50 border-b border-gray-100">
                    <form id="employee-form" class="grid grid-cols-2 gap-4">
                        <input type="hidden" id="employee-id">
                        <input type="text" id="firstName" placeholder="First Name" class="p-2 border rounded" required>
                        <input type="text" id="lastName" placeholder="Last Name" class="p-2 border rounded" required>
                        <input type="email" id="email" placeholder="Email" class="p-2 border rounded" required>
                        <input type="text" id="position" placeholder="Position" class="p-2 border rounded">
                        <div class="col-span-2 flex justify-end space-x-2">
                            <button type="button" onclick="toggleEmployeeForm()" class="px-4 py-2 border rounded">Cancel</button>
                            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Save Employee</button>
                        </div>
                    </form>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                        <tr>
                            <th class="p-4">Name</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Position</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employee-table-body" class="divide-y divide-gray-100">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </section>
        </div>

        <!-- Leave Management Section -->
        <div id="section-leaves" class="content-section hidden">
            <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg">Leave Requests</h3>
                    <button onclick="openLeaveModal()" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">
                        <i class="fas fa-paper-plane mr-1"></i> Request Leave
                    </button>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                        <tr>
                            <th class="p-4">Employee</th>
                            <th class="p-4">Dates</th>
                            <th class="p-4">Reason</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leave-table-body" class="divide-y divide-gray-100">
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <!-- Simple Modals -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl max-w-sm w-full">
            <h3 class="text-xl font-bold mb-4">Confirm Action</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to proceed with this deletion?</p>
            <div class="flex justify-end space-x-3">
                <button id="cancel-delete-btn" class="px-4 py-2 border rounded">Cancel</button>
                <button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 text-white rounded">Delete</button>
            </div>
        </div>
    </div>

    <!-- Request Leave Modal -->
    <div id="leave-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl max-w-md w-full">
            <h3 class="text-xl font-bold mb-4 text-indigo-800">New Leave Request</h3>
            <form id="leave-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase">Start Date</label>
                        <input type="date" id="leave-start" class="w-full p-2 border rounded" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase">End Date</label>
                        <input type="date" id="leave-end" class="w-full p-2 border rounded" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase">Reason</label>
                    <textarea id="leave-reason" class="w-full p-2 border rounded" rows="3" placeholder="e.g. Family vacation" required></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeLeaveModal()" class="px-4 py-2 border rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
